<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvoClaw Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
    .header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; color: #58a6ff; }
    .header .status { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #238636; color: #fff; }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card h2 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
    .metric:last-child { border-bottom: none; }
    .metric .label { color: #8b949e; }
    .metric .value { color: #58a6ff; font-weight: 600; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #21262d; font-family: monospace; font-size: 13px; }
    .log-entry .time { color: #484f58; }
    .log-entry .type { color: #d2a8ff; }
    #events { max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦀 EvoClaw</h1>
    <span class="status" id="status">连接中...</span>
  </div>
  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>系统状态</h2>
        <div class="metric"><span class="label">Engine</span><span class="value" id="engine-status">--</span></div>
        <div class="metric"><span class="label">Compiler</span><span class="value" id="compiler-status">--</span></div>
        <div class="metric"><span class="label">Judge</span><span class="value" id="judge-status">--</span></div>
        <div class="metric"><span class="label">运行时间</span><span class="value" id="uptime">--</span></div>
      </div>
      <div class="card">
        <h2>资源消耗</h2>
        <div class="metric"><span class="label">总 Token 消耗</span><span class="value" id="total-tokens">0</span></div>
        <div class="metric"><span class="label">活跃 Agent</span><span class="value" id="active-agents">0</span></div>
        <div class="metric"><span class="label">已编译插件</span><span class="value" id="compiled-plugins">0</span></div>
        <div class="metric"><span class="label">事件日志条数</span><span class="value" id="event-count">0</span></div>
      </div>
      <div class="card" style="grid-column: 1 / -1;">
        <h2>实时事件流</h2>
        <div id="events"></div>
      </div>
    </div>
  </div>
  <script>
    const eventsDiv = document.getElementById('events');
    const statusEl = document.getElementById('status');

    function connectSSE() {
      const es = new EventSource('/api/events');
      es.onopen = () => { statusEl.textContent = '已连接'; statusEl.style.background = '#238636'; };
      es.onerror = () => { statusEl.textContent = '断开'; statusEl.style.background = '#da3633'; };
      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="time">${data.timestamp || new Date().toISOString()}</span> <span class="type">[${data.event_type || 'info'}]</span> ${data.message || JSON.stringify(data.data || {})}`;
        eventsDiv.prepend(entry);
        if (eventsDiv.children.length > 200) eventsDiv.lastChild.remove();
      };
    }

    // 定期拉取状态
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        if (res.ok) {
          const data = await res.json();
          document.getElementById('engine-status').textContent = data.engine || '--';
          document.getElementById('compiler-status').textContent = data.compiler || '--';
          document.getElementById('judge-status').textContent = data.judge || '--';
          document.getElementById('uptime').textContent = data.uptime || '--';
          document.getElementById('total-tokens').textContent = data.total_tokens || '0';
          document.getElementById('active-agents').textContent = data.active_agents || '0';
          document.getElementById('compiled-plugins').textContent = data.compiled_plugins || '0';
          document.getElementById('event-count').textContent = data.event_count || '0';
        }
      } catch (e) { /* ignore */ }
    }

    connectSSE();
    fetchStatus();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
